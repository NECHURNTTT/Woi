<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAWAIIYUMEE - ASCII ART</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container { padding: 25px; border-bottom: 3px solid #ffffff; }
        .tool-box { border: 3px solid #ffffff; padding: 25px; background: #0a0a0a; margin-bottom: 25px; }
        .tool-box h2 { color: #ffffff; font-size: 32px; margin-bottom: 20px; text-align: center; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        .action-btn { background: #ffffff; color: #000000; border: 3px solid #ffffff; font-size: 18px; font-weight: 900; padding: 10px 25px; cursor: pointer; }
        .action-btn:hover { background: #000000; color: #ffffff; }
        .preview-box { border: 3px solid #ffffff; padding: 15px; background: #111; min-height: 200px; margin-top: 15px; display: flex; justify-content: center; align-items: center; }
        .preview-box img { max-width: 100%; max-height: 300px; border: 2px solid white; }
        .ascii-output { background: #000000; border: 3px solid #ffffff; padding: 15px; color: #00ff00; font-size: 8px; line-height: 6px; font-family: monospace; white-space: pre; overflow-x: auto; min-height: 200px; }
        .size-input { width: 80px; background: #000000; border: 3px solid #ffffff; color: #ffffff; padding: 8px; font-size: 16px; text-align: center; margin: 0 10px; }
        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            border: 3px solid #ffffff;
            background: linear-gradient(145deg, #333333, #000000);
            color: white;
            margin-bottom: 15px;
        }
        .file-label:hover {
            background: linear-gradient(145deg, #ffffff, #cccccc);
            color: black;
        }
    </style>
</head>
<body>
    <div class="binary-bg" id="binaryBg"></div>

    <div class="container">
        <div class="logo-section">
            <img src="logo.png" alt="KAWAIIYUMEE LOGO" class="logo-img large-banner" onerror="this.src='https://via.placeholder.com/150x150/000000/ffffff?text=KY'">
        </div>

        <div class="header">
            <div class="online-badge">
                <span class="online-dot"></span>
                <span class="online-text">ONLINE</span>
            </div>
            <div class="version">v9.0</div>
        </div>

        <div class="title">
            <h1>IMAGE TO ASCII ART</h1>
        </div>

        <div class="sub-menu-container">
            <a href="index.html" class="sub-menu-item">🏠 HOME</a>
            <a href="binary.html" class="sub-menu-item">🔢 BINARY</a>
            <a href="ascii.html" class="sub-menu-item">💻 ASCII</a>
            <a href="morse.html" class="sub-menu-item">⚡ MORSE</a>
            <a href="upload.html" class="sub-menu-item">📸 UPLOAD</a>
            <a href="base64.html" class="sub-menu-item">🔐 BASE64</a>
            <a href="cipher.html" class="sub-menu-item">🔑 CIPHER</a>
            <a href="textreverse.html" class="sub-menu-item">🔄 REVERSE</a>
            <a href="asciiart.html" class="sub-menu-item active">🎨 ASCII ART</a>
            <a href="stegano.html" class="sub-menu-item">🕵️ STEGANO</a>
            <a href="exif.html" class="sub-menu-item">📷 EXIF</a>
            <a href="profile.html" class="sub-menu-item">👤 PROFIL</a>
        </div>

        <div class="tool-container">
            <div class="tool-box">
                <h2>UPLOAD GAMBAR</h2>
                <input type="file" id="imageInput" accept="image/*" class="file-input" style="display: none;">
                <label for="imageInput" class="file-label">
                    <span>📸</span> PILIH GAMBAR
                </label>
                <div class="file-name" id="imageFileName" style="color: #00ff00; margin-bottom: 15px;"></div>
                
                <div style="display: flex; align-items: center; justify-content: center; margin: 20px 0;">
                    <span style="color: white; font-size: 18px;">WIDTH:</span>
                    <input type="number" id="asciiWidth" class="size-input" value="80" min="20" max="200">
                    <span style="color: white; font-size: 18px; margin-left: 15px;">CONTRAST:</span>
                    <input type="range" id="contrast" min="0" max="2" step="0.1" value="1" style="width: 150px;">
                </div>
                
                <div class="btn-group">
                    <button class="action-btn" onclick="convertToASCII()">CONVERT TO ASCII</button>
                    <button class="action-btn" onclick="clearASCII()">CLEAR</button>
                </div>
                
                <div class="preview-box" id="imagePreview"></div>
                <div id="asciiResult" class="ascii-output">...</div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-text">
                POWERED BY <span>SAURUS</span> • 2026
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('imageFileName').textContent = `📌 ${file.name} (${(file.size/1024).toFixed(2)} KB)`;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImage = event.target.result;
                    document.getElementById('imagePreview').innerHTML = `<img src="${event.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            }
        });
        
        function convertToASCII() {
            if (!currentImage) {
                alert('⚠️ PILIH GAMBAR DULU!');
                return;
            }
            
            const width = parseInt(document.getElementById('asciiWidth').value) || 80;
            const contrast = parseFloat(document.getElementById('contrast').value) || 1;
            
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const ratio = img.height / img.width;
                const height = Math.floor(width * ratio * 0.5);
                
                canvas.width = width;
                canvas.height = height;
                
                ctx.drawImage(img, 0, 0, width, height);
                
                const imageData = ctx.getImageData(0, 0, width, height);
                const data = imageData.data;
                
                const chars = ['@', '#', '8', '&', 'o', ':', '*', '.', ' '];
                let ascii = '';
                
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const index = (y * width + x) * 4;
                        const r = data[index];
                        const g = data[index + 1];
                        const b = data[index + 2];
                        
                        let brightness = (0.299 * r + 0.587 * g + 0.114 * b) * contrast;
                        brightness = Math.min(255, Math.max(0, brightness));
                        
                        const charIndex = Math.floor((brightness / 255) * (chars.length - 1));
                        ascii += chars[charIndex];
                    }
                    ascii += '\n';
                }
                
                document.getElementById('asciiResult').innerText = ascii;
                document.getElementById('asciiResult').style.fontSize = '6px';
            };
            img.src = currentImage;
        }
        
        function clearASCII() {
            document.getElementById('imageInput').value = '';
            document.getElementById('imageFileName').textContent = '';
            document.getElementById('imagePreview').innerHTML = '';
            document.getElementById('asciiResult').innerText = '...';
            currentImage = null;
        }
    </script>
</body>
</html>

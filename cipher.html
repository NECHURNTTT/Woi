<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUWAYOO - CIPHER</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container { padding: 25px; border-bottom: 3px solid #ffffff; }
        .tool-box { border: 3px solid #ffffff; padding: 25px; background: #0a0a0a; margin-bottom: 25px; }
        .tool-box h2 { color: #ffffff; font-size: 32px; margin-bottom: 20px; text-align: center; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        .action-btn { background: #ffffff; color: #000000; border: 3px solid #ffffff; font-size: 18px; font-weight: 900; padding: 10px 25px; cursor: pointer; }
        .action-btn:hover { background: #000000; color: #ffffff; }
        .shift-input { width: 100px; background: #000000; border: 3px solid #ffffff; color: #ffffff; padding: 10px; font-size: 18px; text-align: center; margin: 0 15px; }
        .tool-output { background: #000000; border: 3px solid #ffffff; padding: 15px; color: #00ff00; font-size: 16px; font-weight: 700; font-family: 'Courier New', monospace; word-break: break-all; min-height: 100px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="binary-bg" id="binaryBg"></div>

    <div class="container">
        <div class="logo-section">
            <img src="logo.png" alt="KAWAIIYUMEE LOGO" class="logo-img large-banner" onerror="this.src='https://via.placeholder.com/150x150/000000/ffffff?text=KY'">
        </div>

        <div class="header">
            <div class="online-badge">
                <span class="online-dot"></span>
                <span class="online-text">ONLINE</span>
            </div>
            <div class="version">v9.0</div>
        </div>

        <div class="title">
            <h1>CAESAR CIPHER / ROT13</h1>
        </div>

        <div class="sub-menu-container">
            <a href="index.html" class="sub-menu-item">🏠 HOME</a>
            <a href="binary.html" class="sub-menu-item">🔢 BINARY</a>
            <a href="ascii.html" class="sub-menu-item">💻 ASCII</a>
            <a href="morse.html" class="sub-menu-item">⚡ MORSE</a>
            <a href="upload.html" class="sub-menu-item">📸 UPLOAD</a>
            <a href="base64.html" class="sub-menu-item">🔐 BASE64</a>
            <a href="cipher.html" class="sub-menu-item active">🔑 CIPHER</a>
            <a href="textreverse.html" class="sub-menu-item">🔄 REVERSE</a>
            <a href="asciiart.html" class="sub-menu-item">🎨 ASCII ART</a>
            <a href="stegano.html" class="sub-menu-item">🕵️ STEGANO</a>
            <a href="exif.html" class="sub-menu-item">📷 EXIF</a>
            <a href="profile.html" class="sub-menu-item">👤 PROFIL</a>
        </div>

        <div class="tool-container">
            <div class="tool-box">
                <h2>CAESAR CIPHER</h2>
                <textarea id="caesarInput" class="tool-input" placeholder="MASUKKAN TEKS..."></textarea>
                <div style="display: flex; align-items: center; justify-content: center; margin: 15px 0;">
                    <span style="color: white; font-size: 18px;">SHIFT:</span>
                    <input type="number" id="shiftValue" class="shift-input" value="3" min="1" max="25">
                </div>
                <div class="btn-group">
                    <button class="action-btn" onclick="caesarEncrypt()">ENCRYPT</button>
                    <button class="action-btn" onclick="caesarDecrypt()">DECRYPT</button>
                    <button class="action-btn" onclick="clearCaesar()">CLEAR</button>
                </div>
                <div id="caesarOutput" class="tool-output">...</div>
            </div>

            <div class="tool-box">
                <h2>ROT13 (SHIFT 13)</h2>
                <textarea id="rot13Input" class="tool-input" placeholder="MASUKKAN TEKS..."></textarea>
                <div class="btn-group">
                    <button class="action-btn" onclick="rot13()">ROT13</button>
                    <button class="action-btn" onclick="clearRot13()">CLEAR</button>
                </div>
                <div id="rot13Output" class="tool-output">...</div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-text">
                POWERED BY <span>SAURUS</span> • 2026
            </div>
        </div>
    </div>

    <script>
        function caesarShift(text, shift) {
            return text.replace(/[a-zA-Z]/g, function(c) {
                let base = c <= 'Z' ? 65 : 97;
                return String.fromCharCode((c.charCodeAt(0) - base + shift) % 26 + base);
            });
        }
        
        function caesarEncrypt() {
            const input = document.getElementById('caesarInput').value;
            const shift = parseInt(document.getElementById('shiftValue').value) || 3;
            if (!input) { document.getElementById('caesarOutput').innerText = '⚠️ MASUKKAN TEKS!'; return; }
            document.getElementById('caesarOutput').innerText = caesarShift(input, shift);
        }
        
        function caesarDecrypt() {
            const input = document.getElementById('caesarInput').value;
            const shift = parseInt(document.getElementById('shiftValue').value) || 3;
            if (!input) { document.getElementById('caesarOutput').innerText = '⚠️ MASUKKAN TEKS!'; return; }
            document.getElementById('caesarOutput').innerText = caesarShift(input, 26 - shift);
        }
        
        function clearCaesar() {
            document.getElementById('caesarInput').value = '';
            document.getElementById('caesarOutput').innerText = '...';
        }
        
        function rot13() {
            const input = document.getElementById('rot13Input').value;
            if (!input) { document.getElementById('rot13Output').innerText = '⚠️ MASUKKAN TEKS!'; return; }
            document.getElementById('rot13Output').innerText = caesarShift(input, 13);
        }
        
        function clearRot13() {
            document.getElementById('rot13Input').value = '';
            document.getElementById('rot13Output').innerText = '...';
        }
    </script>
</body>
</html>
